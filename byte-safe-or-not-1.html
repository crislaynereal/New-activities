<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Byte's Mission: Safe or Not Safe?</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #f4f6fb 0%, #eaeef7 100%);
    font-family: 'Courier New', 'Roboto Mono', monospace;
    padding: 1.5rem;
    color: #181828;
    user-select: none;
  }

  @keyframes float    { 0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)} }
  @keyframes shake    { 0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)} }
  @keyframes pop      { 0%{transform:scale(0.6);opacity:0}100%{transform:scale(1);opacity:1} }
  @keyframes celebrate{ 0%,100%{transform:scale(1) rotate(0)}25%{transform:scale(1.1) rotate(-6deg)}75%{transform:scale(1.1) rotate(6deg)} }
  @keyframes flash-green { 0%,100%{background:#e3f7ec}50%{background:#a8edca} }
  @keyframes flash-red   { 0%,100%{background:#fde8e0}50%{background:#f9b8b0} }
  @keyframes score-pop   { 0%{transform:scale(1)}50%{transform:scale(1.4)}100%{transform:scale(1)} }

  .float { animation: float 3s ease-in-out infinite; }
  .celebrate { animation: celebrate 1s ease infinite; }
  .shake { animation: shake 0.4s ease; }

  /* ── HEADER ── */
  .header {
    display: flex;
    gap: 1.25rem;
    align-items: center;
    max-width: 860px;
    margin: 0 auto 1rem;
    background: #181828;
    color: #f4f6fb;
    border-radius: 20px;
    padding: 1.25rem 1.5rem;
  }
  #byteEl {
    flex-shrink: 0;
    width: 80px;
    min-width: 80px;
  }
  #byteEl svg, .zone-thumb svg, .scene-card svg {
    display: block;
    width: 100%;
    height: auto;
  }
  .eyebrow { font-size:.7rem; letter-spacing:.2em; color:#f4b942; font-weight:700; margin-bottom:.4rem; }
  .title   { font-size:clamp(1.4rem,5vw,2rem); font-weight:800; margin:0 0 .5rem; }
  .subtitle{ font-size:.92rem; line-height:1.6; color:#c8ccdc; margin:0; }

  /* ── SCOREBOARD ── */
  .scoreboard {
    max-width: 860px;
    margin: 0 auto 1rem;
    display: flex;
    gap: .75rem;
    align-items: center;
    flex-wrap: wrap;
  }
  .score-box {
    background: #fff;
    border: 3px solid #d8dcec;
    border-radius: 16px;
    padding: .6rem 1.2rem;
    display: flex;
    align-items: center;
    gap: .5rem;
    font-weight: 800;
    font-size: 1rem;
  }
  .score-box .score-num {
    font-size: 1.6rem;
    line-height: 1;
    transition: transform .2s;
  }
  .score-box.correct { border-color: #2ab870; }
  .score-box.wrong   { border-color: #e85d2f; }
  .score-box.total   { border-color: #3fc6c6; margin-left: auto; }
  .progress-track {
    flex: 1;
    min-width: 120px;
    height: 12px;
    background: #dde1ec;
    border-radius: 100px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #3fc6c6, #8a5fc4);
    border-radius: 100px;
    transition: width .4s ease;
    width: 0%;
  }

  /* ── DROP ZONES ── */
  .zones {
    max-width: 860px;
    margin: 0 auto 1rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }
  .zone {
    min-height: 140px;
    border: 3px dashed;
    border-radius: 20px;
    padding: 1rem;
    cursor: pointer;
    transition: transform .15s, background .2s;
  }
  .zone.safe   { background: #e3f7ec; border-color: #2ab870; }
  .zone.unsafe { background: #fde8e0; border-color: #e85d2f; }
  .zone.over   { transform: scale(1.03); }
  .zone.flash-green { animation: flash-green .5s ease; }
  .zone.flash-red   { animation: flash-red .5s ease; }
  .zone-header {
    display: flex;
    align-items: center;
    gap: .5rem;
    font-weight: 800;
    font-size: 1.1rem;
    margin-bottom: .6rem;
    letter-spacing: .05em;
  }
  .zone.safe   .zone-header { color: #2ab870; }
  .zone.unsafe .zone-header { color: #e85d2f; }
  .zone-icon { font-size: 1.6rem; font-weight: 900; }
  .zone-thumbs {
    display: flex;
    flex-wrap: wrap;
    gap: .5rem;
  }
  .zone-empty {
    font-size: .85rem;
    color: #a8acc4;
    font-style: italic;
    text-align: center;
    width: 100%;
    padding: .75rem 0;
  }
  .zone-thumb {
    width: 88px;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,.1);
    animation: pop .3s ease;
  }
  .zone-thumb svg { display:block; width:100%; height:auto; }

  /* ── POOL ── */
  .pool-wrap { max-width: 860px; margin: 0 auto; }
  .pool-label {
    font-size: .85rem;
    font-weight: 700;
    color: #7a7e96;
    margin-bottom: .75rem;
    text-align: center;
    min-height: 1.3em;
  }
  .pool {
    display: flex;
    flex-wrap: wrap;
    gap: .75rem;
    justify-content: center;
  }
  .scene-card {
    width: 155px;
    border-radius: 14px;
    overflow: hidden;
    border: 2px solid #d8dcec;
    background: #fff;
    cursor: grab;
    transition: transform .15s, box-shadow .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .scene-card:active  { cursor: grabbing; }
  .scene-card:hover   { transform: translateY(-4px); box-shadow: 0 8px 20px rgba(0,0,0,.12); }
  .scene-card.selected{ outline: 4px solid #f4b942; box-shadow: 0 0 0 6px rgba(244,185,66,.3); }
  .scene-card svg     { display:block; width:100%; height:auto; }

  /* ── FEEDBACK TOAST ── */
  .toast {
    position: fixed;
    top: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: #181828;
    color: #f4f6fb;
    border-radius: 100px;
    padding: .65rem 1.5rem;
    font-size: 1rem;
    font-weight: 800;
    letter-spacing: .04em;
    transition: transform .3s ease;
    z-index: 100;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.good { background: #2ab870; }
  .toast.bad  { background: #e85d2f; }

  /* ── END MODAL ── */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(24,24,40,.65);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    z-index: 50;
  }
  .overlay.show { display: flex; }
  .end-card {
    background: #fff;
    border-radius: 24px;
    padding: 2rem;
    max-width: 440px;
    width: 100%;
    text-align: center;
  }
  .end-title {
    font-family: 'Courier New', monospace;
    font-size: 1.5rem;
    font-weight: 800;
    margin: .5rem 0;
  }
  .end-text {
    font-size: .95rem;
    line-height: 1.6;
    color: #3a3a52;
    margin-bottom: 1rem;
  }
  .final-score {
    display: flex;
    justify-content: center;
    gap: 1rem;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
  }
  .final-score-box {
    border-radius: 16px;
    padding: .75rem 1.25rem;
    font-weight: 800;
    font-size: 1.1rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: .2rem;
  }
  .final-score-box span { font-size: 2rem; line-height: 1; }
  .final-score-box.correct { background: #e3f7ec; color: #0a6b3a; }
  .final-score-box.wrong   { background: #fde8e0; color: #7a1f0a; }
  .replay-btn {
    background: #3fc6c6;
    color: #181828;
    border: none;
    border-radius: 100px;
    padding: .7rem 1.75rem;
    font-size: 1rem;
    font-weight: 800;
    font-family: 'Courier New', monospace;
    cursor: pointer;
  }

  @media (max-width: 520px) {
    .zones { grid-template-columns: 1fr; }
    .scene-card { width: 130px; }
  }
</style>
</head>

// ─────────────────────────────────────
// STATE
// ─────────────────────────────────────
let pool = [], scoreCorrect = 0, scoreWrong = 0, dragId = null, touchSelected = null;
const TOTAL = SCENES.length;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function init() {
  pool = shuffle([...SCENES]);
  scoreCorrect = 0;
  scoreWrong = 0;
  touchSelected = null;
  dragId = null;
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('thumbsSafe').innerHTML   = '<div class="zone-empty">Drop pictures here</div>';
  document.getElementById('thumbsUnsafe').innerHTML = '<div class="zone-empty">Drop pictures here</div>';
  renderPool();
  updateScoreboard();
  setByteMode('idle');
}

function setByteMode(mood) {
  document.getElementById('byteEl').innerHTML = byteSvg(mood, 80);
}

// ─────────────────────────────────────
// SCOREBOARD
// ─────────────────────────────────────
function updateScoreboard() {
  const done = scoreCorrect + scoreWrong;
  document.getElementById('scoreCorrect').textContent = scoreCorrect;
  document.getElementById('scoreWrong').textContent   = scoreWrong;
  document.getElementById('scoreLeft').textContent    = pool.length;
  document.getElementById('progressFill').style.width = `${(done/TOTAL)*100}%`;
}

function animateScore(id) {
  const el = document.getElementById(id);
  el.style.animation = 'score-pop .3s ease';
  setTimeout(() => el.style.animation = '', 300);
}

// ─────────────────────────────────────
// TOAST
// ─────────────────────────────────────
let toastTimer;
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = 'toast', 1500);
}

// ─────────────────────────────────────
// DROP LOGIC
// ─────────────────────────────────────
function dropItem(item, zone) {
  const correct = item.zone === zone;
  // add thumb
  const thumbsEl = document.getElementById(zone === 'safe' ? 'thumbsSafe' : 'thumbsUnsafe');
  const empty = thumbsEl.querySelector('.zone-empty');
  if (empty) empty.remove();
  const div = document.createElement('div');
  div.className = 'zone-thumb';
  div.innerHTML = item.svg;
  thumbsEl.appendChild(div);

  // flash zone
  const zoneEl = document.getElementById(zone === 'safe' ? 'zoneSafe' : 'zoneUnsafe');
  if (correct) {
    zoneEl.classList.add('flash-green');
    setTimeout(() => zoneEl.classList.remove('flash-green'), 500);
    scoreCorrect++;
    animateScore('scoreCorrect');
    showToast('✓ Correct! +1', 'good');
    setByteMode('happy');
  } else {
    zoneEl.classList.add('flash-red');
    setTimeout(() => zoneEl.classList.remove('flash-red'), 500);
    scoreWrong++;
    animateScore('scoreWrong');
    showToast('✕ Oops! Try again next time', 'bad');
    setByteMode('worried');
  }

  setTimeout(() => setByteMode('idle'), 1500);

  pool = pool.filter(i => i.id !== item.id);
  updateScoreboard();
  renderPool();

  if (pool.length === 0) {
    setTimeout(showEnd, 800);
  }
}

// ─────────────────────────────────────
// END SCREEN
// ─────────────────────────────────────
function showEnd() {
  document.getElementById('finalCorrect').textContent = scoreCorrect;
  document.getElementById('finalWrong').textContent   = scoreWrong;
  const perfect = scoreCorrect === TOTAL;
  document.getElementById('endTitle').textContent = perfect ? 'Perfect! Byte is safe! 🎉' : 'Great job!';
  document.getElementById('endText').textContent  = perfect
    ? 'You got every single one right! You are a real Digital Guardian!'
    : `You got ${scoreCorrect} out of ${TOTAL}. Let's talk about the ones we missed together!`;
  document.getElementById('byteEnd').innerHTML = byteSvg(perfect ? 'happy' : 'idle', 100);
  document.getElementById('overlay').classList.add('show');
}

// ─────────────────────────────────────
// POOL RENDERING
// ─────────────────────────────────────
function renderPool() {
  const poolEl = document.getElementById('pool');
  const label  = document.getElementById('poolLabel');
  poolEl.innerHTML = '';

  if (pool.length === 0) {
    label.textContent = 'All done!';
    return;
  }

  label.textContent = touchSelected
    ? '👆 Now tap a box above!'
    : 'Drag a picture — or tap to select, then tap a box above!';

  pool.forEach(item => {
    const card = document.createElement('div');
    card.className = 'scene-card' + (touchSelected && touchSelected.id === item.id ? ' selected' : '');
    card.innerHTML = item.svg;
    card.draggable = true;

    // drag
    card.addEventListener('dragstart', e => {
      dragId = item.id;
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', () => { dragId = null; });

    // tap (touch/click fallback)
    card.addEventListener('click', () => {
      if (touchSelected && touchSelected.id === item.id) {
        touchSelected = null;
      } else {
        touchSelected = item;
      }
      renderPool();
    });

    poolEl.appendChild(card);
  });
}

// ─────────────────────────────────────
// DROP ZONE CLICK (for tap flow)
// ─────────────────────────────────────
document.getElementById('zoneSafe').addEventListener('click', () => {
  if (touchSelected) { dropItem(touchSelected, 'safe'); touchSelected = null; }
});
document.getElementById('zoneUnsafe').addEventListener('click', () => {
  if (touchSelected) { dropItem(touchSelected, 'unsafe'); touchSelected = null; }
});

// ─────────────────────────────────────
// DRAG DROP HANDLERS
// ─────────────────────────────────────
function handleDrop(e, zone) {
  e.preventDefault();
  document.getElementById(zone === 'safe' ? 'zoneSafe' : 'zoneUnsafe').classList.remove('over');
  const item = pool.find(i => i.id === dragId);
  if (item) dropItem(item, zone);
}

// ─────────────────────────────────────
// START
// ─────────────────────────────────────
init();
</script>
